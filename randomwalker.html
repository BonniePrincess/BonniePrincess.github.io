<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
	<title></title>
</head>
<body>




<script>
	let xpos
	let ypos

	function setup(){
		createCanvas(800,800)
		background(200)
xpos=width/2
ypos=height/2
let randomNumber=floor(random(4))
console.log(randomNumber)

	}

	function draw(){
		let randomColor=random(["00A6A6","BBDEF0","EFCA08","F49F0A","F08700"])
		let randomNumber=floor(random(4))
console.log(randomNumber)
	if (randomNumber == 0){
		xpos = xpos+8
	} else if(randomNumber==1){
		xpos=xpos-8
	} else if(randomNumber==2){
		ypos=ypos+8
	}else if(randomNumber==3){
		ypos=ypos-8
	}
	fill(randomColor)
	circle(xpos,ypos,8)
	}
</script>
</body>
</html>
