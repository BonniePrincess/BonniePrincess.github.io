<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
	<title></title>
</head>
<body>


<script>
	function setup() {
	createCanvas(400,400)
}

function draw(){
	background(200)
	for (i=0;i<5;i++){
	for(j=0;j<5;j++){
		circle(i*100,j*100,100)
	}
}
	for (i=0;i<5;i++){
	for(j=0;j<5;j++){
		circle(i*100,j*100,80)
	}
}
	for (i=0;i<5;i++){
	for(j=0;j<5;j++){
		circle(i*100,j*100,60)
	}
}

	for (i=0;i<5;i++){
	for(j=0;j<5;j++){
		circle(i*100,j*100,40)
	}
}

for (i=0;i<5;i++){
	for(j=0;j<5;j++){
		circle(i*100,j*100,20)
	}
}

for (i=0;i<5;i++){
	for(j=0;j<5;j++){
		circle(i*100,j*100,1)
	}
}


}
</script>
</body>
</html>
