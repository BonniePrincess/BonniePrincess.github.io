<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>

	body{
		background-color: floralwhite;
	}
		.confetti{ 
			position:absolute;
			 animation-name: swing;
animation-duration: 1s;
 animation-iteration-count: infinite;
animation-direction: alternate;
@keyframes swing{
	from{
		transform: rotate(-45deg);


	}
	to{
		transform:rotate(45deg);

	}
}

	</style>


</head>
<body>
<button id="btn">drop confetti</button>

<input type="color" value="#FDCA40" id="colorpicker">

<input type="range" min="1" max="10" step="1" id="slider" value="1">


<script type=text/javascript>
let colors = ["#0B0033","#370031","#832232","#CE8964", "#EAF27C"]

let dropConfettiBtn = document.getElementById("btn")

let colorPicker = document.getElementById("colorpicker")

let slider = document.getElementById("slider")

console.log(colorPicker.value)

	
	let falling = -30
	
	function makeConfetti(){
	let square= document.createElement(
"div")
	square.classList.add("confetti")
	document.body.appendChild(square)
	let randomColorIndex = Math.floor(Math.random()*colors.length)
	square.style.backgroundColor = colorPicker.value
	square.style.left=Math.random()*2000+"px"
	square.style.top=0+"px"
	square.style.height=Math.random()*100+"px"
	square.style.width=Math.random()*70+"px"




function fall(){
	let fallFactor = 10
	falling=falling+50

	square.style.top = parseInt(square.style.top)+fallFactor+"px" 
	if(parseInt(square.style.top) > 1000) {
		square.style.top = -30 + "px"
	}
}


setInterval(fall, 50)
}

setInterval(makeConfetti, 500)

dropConfettiBtn.addEventListener("click", function(){
	console.log("I click it")
	for(let i = 0; i < slider.value; i++){
		makeConfetti()
	}
	
})

</script>
</body>
</html>
